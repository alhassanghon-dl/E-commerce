<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>مكتبة أوبلس الرقمية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#F2F1EE;--surface:#FFFFFF;--surface-soft:#F7F6F4;
  --ink:#171717;--ink-soft:#6B6B6B;--ink-faint:#9A9A9A;
  --line:#E6E4E0;--line-soft:#EFEDE9;
  --red:#E2241B;--red-dark:#A4151B;--red-soft:#FBEAE9;
  --radius:14px;--shadow:0 12px 30px rgba(0,0,0,.06);
}
[data-theme="dark"]{
  --bg:#121212;--surface:#1B1B1B;--surface-soft:#161616;
  --ink:#F2F2F0;--ink-soft:#A3A3A3;--ink-faint:#6E6E6E;
  --line:#2B2B2B;--line-soft:#232323;
  --red:#FF4438;--red-dark:#ff6b5e;--red-soft:rgba(255,68,56,.12);
  --shadow:0 12px 30px rgba(0,0,0,.5);
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Tajawal',sans-serif;direction:rtl;text-align:right}
button,input{font:inherit;color:inherit}
:focus-visible{outline:2px solid var(--red);outline-offset:2px}
@media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* ===================== المحتوى ===================== */
.wrap{max-width:1080px;margin:auto;padding:30px 22px 60px;opacity:0;transition:opacity .5s ease}
.wrap.show{opacity:1}

header{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:30px;animation:fadeUp .5s ease}
.brand{display:flex;align-items:center;gap:12px;margin:auto}
.brand .bar{width:5px;height:34px;border-radius:3px;background:var(--red)}
.brand-text{text-align:center}
.brand h1{font-size:21px;margin:0;font-weight:900}
.brand span{display:block;color:var(--ink-soft);font-size:12px;margin-top:3px}
.theme-toggle{width:46px;height:26px;border-radius:20px;border:1px solid var(--line);cursor:pointer;background:var(--surface-soft);position:relative;flex:none;padding:0}
.theme-toggle:after{content:'';position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:var(--ink);box-shadow:0 2px 5px rgba(0,0,0,.25);transition:transform .25s}
[data-theme="dark"] .theme-toggle:after{transform:translateX(-20px);background:#F2F2F0}

/* شريط أحدث الإضافات */
.slider-section{margin-bottom:26px;animation:fadeUp .55s ease .05s both}
.slider-title{text-align:center;font-size:13px;font-weight:700;color:var(--red);margin-bottom:10px;letter-spacing:.02em}
.slider{position:relative;overflow:hidden;border-radius:var(--radius);border:1px solid var(--line);background:var(--surface);box-shadow:var(--shadow);height:132px;touch-action:pan-y}
.slide{position:absolute;inset:0;display:flex;align-items:center;gap:18px;padding:0 26px;opacity:0;transform:translateX(24px);transition:opacity .6s ease, transform .6s ease;pointer-events:none;border:0;background:transparent;color:inherit;cursor:pointer;width:100%;height:100%}
.slide.active{opacity:1;transform:none;pointer-events:auto}
.slide .filetype{font-size:11.5px;font-weight:900;color:var(--red);background:var(--red-soft);padding:6px 12px;border-radius:7px;flex:none;direction:ltr}
.slide-meta{min-width:0;flex:1}
.slide-meta h4{margin:0 0 4px;font-size:16.5px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slide-meta span{font-size:12.5px;color:var(--ink-faint)}
.slide-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px}
.slide-dots span{width:5px;height:5px;border-radius:50%;background:var(--line)}
.slide-dots span.active{background:var(--red);width:14px;border-radius:3px;transition:width .3s}

.toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;animation:fadeUp .5s ease .1s both}
.search{flex:1;min-width:200px;padding:12px 16px;border:1.5px solid var(--line);border-radius:10px;background:var(--surface);color:var(--ink);outline:0}
.search:focus{border-color:var(--red)}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:26px;justify-content:center;animation:fadeUp .5s ease .15s both}
.chip{border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);padding:8px 16px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s,color .2s,border-color .2s}
.chip.active{background:var(--red);border-color:var(--red);color:#fff}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px;animation:fadeUp .45s ease both;transition:transform .25s ease, box-shadow .25s ease}
.card:hover{transform:translateY(-4px);box-shadow:0 18px 36px rgba(0,0,0,.09)}
[data-theme="dark"] .card:hover{box-shadow:0 18px 36px rgba(0,0,0,.55)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.filetype{font-size:10.5px;font-weight:900;letter-spacing:.03em;color:var(--red);background:var(--red-soft);padding:4px 9px;border-radius:6px;direction:ltr}
.card-date{font-size:11px;color:var(--ink-faint)}
.card h3{font-size:15.5px;margin:0;line-height:1.5;font-weight:700;text-align:center}
.card p{margin:0;color:var(--ink-soft);font-size:12.5px;line-height:1.7;text-align:center}
.card-cat{font-size:11.5px;color:var(--ink-faint);text-align:center}
.card .open{margin-top:auto;text-align:center;text-decoration:none;background:var(--ink);color:var(--bg);padding:10px;border-radius:9px;font-weight:700;font-size:13.5px;transition:opacity .2s;border:0;cursor:pointer;width:100%}
.card .open:hover{opacity:.85}

.empty{background:var(--surface);border:1.5px dashed var(--line);border-radius:var(--radius);padding:50px 24px;text-align:center;color:var(--ink-faint);animation:fadeUp .4s ease}
.empty strong{display:block;color:var(--ink);font-size:16px;margin-bottom:8px;font-weight:700}

footer{text-align:center;color:var(--ink-faint);font-size:11.5px;margin-top:34px;line-height:1.8}

/* ===================== عارض الملفات الداخلي ===================== */
.viewer{animation:fadeUp .35s ease}
.viewer-bar{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.viewer-back{border:1px solid var(--line);background:var(--surface);color:var(--ink);padding:9px 16px;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;flex:none;transition:opacity .2s}
.viewer-back:hover{opacity:.8}
.viewer-title{font-weight:700;font-size:15px;flex:1;text-align:center;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.viewer-body{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;min-height:60vh}
.viewer-frame{width:100%;height:80vh;border:0;display:block}
.viewer-loading,.viewer-error{padding:60px 24px;text-align:center;color:var(--ink-faint)}
.viewer-error a{color:var(--red);font-weight:700}
.xlsx-wrap{overflow:auto;max-height:80vh;padding:4px}
.xlsx-wrap table{border-collapse:collapse;width:100%;font-size:12.5px}
.xlsx-wrap td,.xlsx-wrap th{border:1px solid var(--line);padding:8px 10px;text-align:center;white-space:nowrap}
.xlsx-wrap tr:first-child td{background:var(--red-soft);font-weight:700;color:var(--red-dark)}
[data-theme="dark"] .xlsx-wrap tr:first-child td{color:var(--red)}

/* ---- صفحات داخلية (تحويل المستند لداشبورد حقيقي بدل ملف خام) ---- */
.page-content{padding:28px 26px 8px}
.page-content .lede{text-align:center;color:var(--ink-soft);font-size:13.5px;line-height:1.85;max-width:640px;margin:0 auto 28px}
.page-content h3.section-title{text-align:center;font-size:18px;font-weight:900;margin:38px 0 16px}
.page-content h3.section-title:first-of-type{margin-top:0}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:22px}
.stat-card{background:var(--surface-soft);border:1px solid var(--line);border-radius:12px;padding:16px 10px;text-align:center}
.stat-card b{display:block;font-size:20px;color:var(--red);font-weight:900;direction:ltr}
.stat-card span{font-size:11.5px;color:var(--ink-soft)}
.highlight-box{background:linear-gradient(155deg,var(--red),var(--red-dark));color:#fff;border-radius:14px;padding:22px;text-align:center;margin-bottom:8px}
.highlight-box b{display:block;font-size:28px;font-weight:900;margin:5px 0;direction:ltr}
.highlight-box span{font-size:12.5px;opacity:.9}
.two-col{display:grid;gap:10px;grid-template-columns:1fr}
.goal-item{background:var(--surface-soft);border:1px solid var(--line);border-radius:10px;padding:11px 15px;font-size:13px;display:flex;gap:9px;align-items:flex-start}
.goal-item b{color:var(--red);flex:none}
.role-grid{display:grid;gap:12px;grid-template-columns:1fr}
.role-card{background:var(--surface-soft);border:1px solid var(--line);border-radius:12px;padding:16px}
.role-card h4{margin:0 0 9px;font-size:14px;color:var(--red);text-align:center}
.role-card ul{margin:0;padding-inline-start:18px;font-size:12.5px;color:var(--ink-soft);line-height:1.85}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-label{width:64px;font-size:12px;flex:none}
.bar-track{flex:1;background:var(--surface-soft);border-radius:6px;overflow:hidden;height:24px}
.bar-fill{background:var(--red);height:100%;border-radius:6px}
.bar-fill.final{background:var(--red-dark)}
.bar-value{width:74px;text-align:left;font-size:11.5px;color:var(--ink-soft);flex:none;direction:ltr}
.kpi-grid{display:grid;gap:12px;grid-template-columns:1fr}
.kpi-card{background:var(--surface-soft);border:1px solid var(--line);border-radius:12px;padding:15px}
.kpi-card h4{margin:0 0 8px;font-size:13.5px;color:var(--red);text-align:center}
.kpi-card ul{margin:0;padding-inline-start:18px;font-size:12px;color:var(--ink-soft);line-height:1.8}
.checklist{list-style:none;padding:0;margin:0;display:grid;gap:8px}
.checklist li{display:flex;gap:8px;font-size:13px;background:var(--surface-soft);border-radius:8px;padding:10px 14px}
.checklist li:before{content:'✓';color:#16a34a;font-weight:900;flex:none}
[data-theme="dark"] .checklist li:before{color:#4ade80}
.source-note{text-align:center;margin:30px 0 6px;padding-top:16px;border-top:1px solid var(--line-soft)}
.source-note a{color:var(--red);font-weight:700;font-size:12.5px;text-decoration:none}

.invoice-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.invoice-top b{display:block;font-size:15px}
.invoice-top span{display:block;font-size:11.5px;color:var(--ink-faint);margin-top:2px}
.invoice-no{background:var(--red-soft);color:var(--red-dark);font-weight:700;font-size:12px;padding:6px 12px;border-radius:8px;direction:ltr}
[data-theme="dark"] .invoice-no{color:var(--red)}
.download-btn{display:block;text-align:center;text-decoration:none;background:var(--ink);color:var(--bg);padding:13px;border-radius:10px;font-weight:700;font-size:14px;margin-top:22px;transition:opacity .2s}
.download-btn:hover{opacity:.85}
.table-wrap{overflow-x:auto;margin-bottom:8px}
.data-table{border-collapse:collapse;width:100%;font-size:12.5px}
.data-table th,.data-table td{border:1px solid var(--line);padding:9px 10px;text-align:center}
.data-table th{background:var(--red-soft);color:var(--red-dark);font-weight:700}
[data-theme="dark"] .data-table th{color:var(--red)}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.pill.done{background:rgba(22,163,74,.15);color:#16a34a}
.pill.progress{background:rgba(217,164,65,.18);color:#b8860b}
.pill.pending{background:var(--line-soft);color:var(--ink-faint)}
[data-theme="dark"] .pill.progress{color:#e6b84f}
.axis-block{margin-bottom:18px}
.axis-block h4{font-size:13.5px;margin:0 0 8px;text-align:center;color:var(--ink)}
.task-row{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--surface-soft);border:1px solid var(--line);border-radius:9px;padding:9px 13px;font-size:12.5px;margin-bottom:6px}
.task-row span:first-child{flex:1}
.cross-list{list-style:none;padding:0;margin:0;display:grid;gap:8px}
.cross-list li{display:flex;gap:8px;font-size:13px;background:var(--surface-soft);border-radius:8px;padding:10px 14px}
.cross-list li:before{content:'✕';color:var(--red);font-weight:900;flex:none}
.ltr-block{direction:ltr;text-align:left}
.ltr-block .lede{text-align:left}
.ltr-block h3.section-title{text-align:left}

@media(min-width:640px){
  .two-col{grid-template-columns:1fr 1fr}
  .role-grid{grid-template-columns:repeat(3,1fr)}
  .kpi-grid{grid-template-columns:1fr 1fr}
}

@media(min-width:720px){
  .brand h1{font-size:24px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
}
@media(max-width:520px){
  .wrap{padding:20px 15px 46px}
  .grid{grid-template-columns:1fr}
  .slider{height:150px}
}
</style>
</head>
<body data-theme="light">

<div class="wrap show" id="wrap">

<header>
  <div class="brand">
    <div class="bar"></div>
    <div class="brand-text">
      <h1>مكتبة أوبلس الرقمية</h1>
      <span id="fileCount">٠ ملفات</span>
    </div>
  </div>
  <button class="theme-toggle" id="themeToggle" aria-label="تبديل الوضع الداكن"></button>
</header>

<div class="slider-section" id="sliderSection" style="display:none">
  <div class="slider-title">أحدث الإضافات</div>
  <div class="slider" id="slider"></div>
</div>

<div id="mainContent">
<div class="toolbar">
  <input class="search" id="searchInput" type="text" placeholder="ابحث باسم الملف أو الوصف...">
</div>

<div class="chips" id="chips"></div>

<div class="grid" id="grid"></div>
<div class="empty" id="emptyState" style="display:none">
  <strong>لسه مفيش ملفات مضافة</strong>
  ضيف ملفاتك في مصفوفة "files" في أسفل الكود، وارفع الملف نفسه بجانب index.html.
</div>
</div>

<div class="viewer" id="viewer" hidden>
  <div class="viewer-bar">
    <button class="viewer-back" id="viewerBack">→ رجوع للمكتبة</button>
    <div class="viewer-title" id="viewerTitle"></div>
  </div>
  <div class="viewer-body" id="viewerBody"></div>
</div>

<footer>مكتبة داخلية لتوثيق مشاريع صيدليات أوبلس الرقمية — تُحدَّث أولًا بأول.</footer>
</div>

<script>
(() => {
'use strict';

/* ============================================================
   ضيف كل ملف جديد كسطر واحد هنا، وارفع الملف نفسه في مجلد files/
   category أمثلة: "استراتيجية" | "تقارير" | "دراسات" | "أدوات"
   type أمثلة: "PDF" | "XLSX" | "PPTX" | "HTML"
   الأحدث حسب "date" بيظهر في شريط "أحدث الإضافات" تلقائيًا
   ============================================================ */
const files = [
  {
    title: "الخطة التنفيذية للتسويق الإلكتروني والبيع أونلاين",
    description: "الخطة الكاملة (يوليو–ديسمبر 2026) لرفع المبيعات الشهرية من 95,000 إلى 300,000 ريال — الأهداف، الهيكل الوظيفي، المشروعات، والمؤشرات.",
    category: "استراتيجية",
    type: "PAGE",
    page: "executivePlan",
    date: "2026-07-13",
    href: "executive-plan-h2-2026.pdf"
  },
  {
    title: "التقرير التنفيذي المختصر (نسختان)",
    description: "ملخص تنفيذي من صفحتين لنفس الخطة، لعرض سريع على الإدارة.",
    category: "استراتيجية",
    type: "PAGE",
    page: "execSummary2Pages",
    date: "",
    href: "executive-report-2pages-revised.pdf"
  },
  {
    title: "التصور الشامل لاجتماعات التحول الرقمي",
    description: "تحليل موحّد لثلاث اجتماعات: ترقية باقة زد، تشغيل جوليب كطبقة تشغيل خلفية، ونقل واتساب API من أزير إلى جوليب.",
    category: "دراسات",
    type: "PAGE",
    page: "transformationOverview",
    date: "",
    href: "digital-transformation-meetings-overview.pdf"
  },
  {
    title: "عرض Tomato Agency للتسويق الرقمي وSEO",
    description: "عرض خارجي لتحسين محركات البحث وتصميم واجهة المتجر والتطبيق — 4,000 ريال لمدة 30 يومًا.",
    category: "عروض أسعار",
    type: "PAGE",
    page: "tomatoProposal",
    date: "2026-07-01",
    href: "tomato-agency-seo-proposal.pdf"
  },
  {
    title: "متابعة المهام حتى نهاية 2026",
    description: "44 مهمة عبر 12 محورًا لخطة يوليو–ديسمبر 2026، مع نسبة الإنجاز حسب المحور.",
    category: "أدوات",
    type: "PAGE",
    page: "tasksTracker",
    date: "2026-07-19",
    href: "tasks-2026-tracker.xlsx"
  },
  {
    title: "فاتورة تجديد اشتراك زد",
    description: "فاتورة ضريبية لتجديد باقة نمو الشهرية على منصة زد — 299 ريال.",
    category: "فواتير",
    type: "PAGE",
    page: "invoiceZid",
    date: "2026-07-18",
    href: "zid-renewal-invoice-2026-07.pdf"
  },
  {
    title: "فاتورة اشتراك أزير لواتساب API",
    description: "فاتورة ضريبية سنوية لخدمة Azeer for WhatsApp API — 57.50 ريال.",
    category: "فواتير",
    type: "PAGE",
    page: "invoiceAzeer",
    date: "2026-07-16",
    href: "azeer-zid-invoice-2026-07.pdf"
  },
  {
    title: "إيصال شحن رصيد حملات أزير",
    description: "إيصال دفع لشحن رصيد الحملات على منصة أزير عبر بوابة Twerlo — 215.63 ريال.",
    category: "فواتير",
    type: "PAGE",
    page: "invoiceAzeerRecharge",
    date: "2026-07-05",
    href: "azeer-recharge-receipt.jpg"
  },
  {
    title: "شيلف توكر يوليو 2026",
    description: "ملف تصميم بطاقات رفوف العروض — 255 عرضًا، كل عرض في صفحة A6 مستقلة، النسخة النهائية المعتمدة.",
    category: "العروض الشهرية",
    type: "PDF",
    date: "2026-07-26",
    href: "shelf-talker-july-2026-final.pdf"
  },
  {
    title: "ملف أسعار عروض يوليو 2026",
    description: "قائمة العروض والأسعار الشهرية بشيتين (السعر قبل وبعد الخصم، نسبة الخصم، تواريخ البداية والنهاية) — جاهز للرفع على زد.",
    category: "العروض الشهرية",
    type: "XLSX",
    date: "2026-07-26",
    href: "monthly-offers-prices-july-2026.xlsx"
  },
];

/* ---------- عرض الملفات ---------- */
const grid = document.getElementById('grid');
const emptyState = document.getElementById('emptyState');
const fileCount = document.getElementById('fileCount');
const chipsEl = document.getElementById('chips');
const searchInput = document.getElementById('searchInput');
let activeCategory = 'الكل';

function render(){
  const query = searchInput.value.trim().toLowerCase();
  const filtered = files.filter(f => {
    const matchesCategory = activeCategory === 'الكل' || f.category === activeCategory;
    const matchesQuery = !query || (f.title + ' ' + (f.description||'')).toLowerCase().includes(query);
    return matchesCategory && matchesQuery;
  });

  fileCount.textContent = files.length + ' ملفات';
  grid.innerHTML = '';
  emptyState.style.display = files.length === 0 ? 'block' : 'none';
  emptyState.querySelector('strong').textContent = files.length === 0
    ? 'لسه مفيش ملفات مضافة'
    : (filtered.length === 0 ? 'مفيش نتائج مطابقة' : '');
  if (files.length > 0 && filtered.length === 0){
    emptyState.style.display = 'block';
    emptyState.lastChild.textContent = 'جرب كلمة بحث أو تصنيف مختلف.';
  }

  filtered.forEach((f, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = Math.min(i * 0.05, 0.4) + 's';
    card.innerHTML = `
      <div class="card-top">

        <span class="card-date">${f.date || ''}</span>

    `;
    card.querySelector('.open').onclick = () => openViewer(f);

}

function renderChips(){

  chipsEl.innerHTML = '';
  categories.forEach(cat => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (cat === activeCategory ? ' active' : '');
    chip.textContent = cat;
    chip.onclick = () => { activeCategory = cat; renderChips(); render(); };
    chipsEl.appendChild(chip);
  });
}

/* ---------- شريط أحدث الإضافات (سلايدر متحرك) ---------- */
function initSlider(){
  const section = document.getElementById('sliderSection');
  const slider = document.getElementById('slider');
  if (!files.length){ section.style.display = 'none'; return; }

  const latest = [...files].sort((a,b) => (b.date||'').localeCompare(a.date||'')).slice(0, 5);
  section.style.display = 'block';
  slider.innerHTML = '';

  latest.forEach((f, i) => {
    const slide = document.createElement('button');
    slide.type = 'button';
    slide.className = 'slide' + (i === 0 ? ' active' : '');
    slide.style.textAlign = 'inherit'; slide.style.font = 'inherit';
    slide.innerHTML = `
      <span class="filetype">${f.type}</span>
      <div class="slide-meta"><h4>${f.title}</h4><span>${f.category || ''} — ${f.date || ''}</span></div>
    `;
    slide.onclick = () => { if (!slide.dataset.dragged) openViewer(f); };
    slider.appendChild(slide);
  });

  if (latest.length <= 1) return;

  const dots = document.createElement('div');
  dots.className = 'slide-dots';
  latest.forEach((_, i) => {
    const dot = document.createElement('span');
    if (i === 0) dot.className = 'active';
    dot.onclick = () => goTo(i);
    dots.appendChild(dot);
  });
  slider.appendChild(dots);

  let current = 0;
  let timer;
  const slides = () => slider.querySelectorAll('.slide');
  const dotEls = () => slider.querySelectorAll('.slide-dots span');

  function goTo(i){
    const s = slides(), d = dotEls();
    s[current].classList.remove('active');
    d[current].classList.remove('active');
    current = (i + s.length) % s.length;
    s[current].classList.add('active');
    d[current].classList.add('active');
  }
  function next(){ goTo(current + 1); }
  function prev(){ goTo(current - 1); }
  function restartTimer(){
    clearInterval(timer);
    timer = setInterval(next, 4000);
  }
  restartTimer();

  let touchStartX = 0, touchDeltaX = 0;
  slider.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchDeltaX = 0;
  }, {passive: true});
  slider.addEventListener('touchmove', e => {
    touchDeltaX = e.touches[0].clientX - touchStartX;
  }, {passive: true});
  slider.addEventListener('touchend', () => {
    if (Math.abs(touchDeltaX) > 35){
      latest.forEach((f, i) => { slider.querySelectorAll('.slide')[i].dataset.dragged = '1'; });
      if (touchDeltaX < 0) next(); else prev();
      restartTimer();
      setTimeout(() => slides().forEach(s => delete s.dataset.dragged), 200);
    }
  });
}

/* ---------- عارض الملفات داخل الموقع (بدون تنزيل أو مغادرة الصفحة) ---------- */
const mainContent = document.getElementById('mainContent');
const viewer = document.getElementById('viewer');
const viewerTitle = document.getElementById('viewerTitle');
const viewerBody = document.getElementById('viewerBody');

async function openViewer(f){
  mainContent.hidden = true;
  document.getElementById('sliderSection').style.display = 'none';
  viewer.hidden = false;
  viewerTitle.textContent = f.title;
  viewerBody.innerHTML = '<div class="viewer-loading">جاري تجهيز الملف…</div>';
  window.scrollTo({top: 0, behavior: 'smooth'});

  if (f.type === 'PAGE'){
    viewerBody.innerHTML = pageRenderers[f.page] ? pageRenderers[f.page](f) : '<div class="viewer-error">الصفحة غير جاهزة بعد.</div>';
  } else if (f.type === 'XLSX'){
    try{
      const res = await fetch(f.href);
      if (!res.ok) throw new Error('fetch failed');
      const buf = await res.arrayBuffer();
      const wb = XLSX.read(buf, {type: 'array'});
      const sections = wb.SheetNames.map(name => {
        const html = XLSX.utils.sheet_to_html(wb.Sheets[name]);
        const label = wb.SheetNames.length > 1 ? `<h3 class="section-title">${name}</h3>` : '';
        return label + '<div class="xlsx-wrap">' + html + '</div>';
      });
      viewerBody.innerHTML = '<div class="page-content">' + sections.join('') + '</div>';
    }catch(err){
      viewerBody.innerHTML = '<div class="viewer-error">تعذر عرض الملف داخل الموقع.<br><a href="'+f.href+'" target="_blank" rel="noopener">فتح الملف في تبويب جديد</a></div>';
    }
  } else {
    const src = f.type === 'PDF'
      ? 'https://docs.google.com/viewer?embedded=true&url=' + encodeURIComponent(location.origin + '/' + f.href)
      : f.href;
    viewerBody.innerHTML = '<iframe class="viewer-frame" src="'+src+'"></iframe>';
  }
}

function closeViewer(){
  viewer.hidden = true;
  viewerBody.innerHTML = '';
  mainContent.hidden = false;
  if (files.length) document.getElementById('sliderSection').style.display = 'block';
}
document.getElementById('viewerBack').onclick = closeViewer;

const body = document.body;
function saveTheme(v){ try{ localStorage.setItem('oplus-library-theme', v); }catch{} }
try{ const saved = localStorage.getItem('oplus-library-theme'); if(saved) body.dataset.theme = saved; }catch{}
document.getElementById('themeToggle').onclick = () => {
  body.dataset.theme = body.dataset.theme === 'dark' ? 'light' : 'dark';
  saveTheme(body.dataset.theme);
};

renderChips();
render();
initSlider();
})();
</script>
</body>
